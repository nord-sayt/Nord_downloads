```html
<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NORD ADMIN</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<script>

if(localStorage.getItem("adminLogged") !== "true"){
    window.location.href = "admin-login.html";
}

</script>

<div class="background"></div>

<header>

<div class="logo">
⚡ NORD ADMIN
</div>

<nav>

<a href="index.html">خانه</a>
<a href="downloads.html">دانلودها</a>
<a href="gallery.html">گالری</a>
<a href="news.html">اخبار</a>
<a href="support.html">پشتیبانی</a>

</nav>

</header>

<section class="admin-header">

<h1>🛠 پنل مدیریت</h1>

<p>مدیریت پیام های کاربران</p>

<button class="logout-btn" onclick="logout()">
🚪 خروج
</button>

</section>

<section class="admin-stats">

<div class="stat-card">

<h2 id="messageCount">0</h2>

<span>پیام دریافتی</span>

</div>

</section>

<section id="messagesContainer">

</section>

<script>

let messages =
JSON.parse(
localStorage.getItem("supportMessages")
) || [];

document.getElementById(
"messageCount"
).innerText =
messages.length;

function loadMessages(){

const container =
document.getElementById(
"messagesContainer"
);

container.innerHTML = "";

if(messages.length === 0){

container.innerHTML = `
<div class="message-card">
<h3>پیامی وجود ندارد</h3>
</div>
`;

return;

}

messages.slice().reverse().forEach(
(msg,index)=>{

container.innerHTML += `

<div class="message-card">

<h3>${msg.subject}</h3>

<p><strong>نام:</strong> ${msg.name}</p>

<p>${msg.message}</p>

<small>${msg.date}</small>

<br><br>

<button
class="delete-btn"
onclick="deleteMessage(${messages.length-1-index})">

حذف پیام

</button>

</div>

`;

});

}

function deleteMessage(index){

if(!confirm("پیام حذف شود؟")){
return;
}

messages.splice(index,1);

localStorage.setItem(
"supportMessages",
JSON.stringify(messages)
);

location.reload();

}

function logout(){

localStorage.removeItem(
"adminLogged"
);

window.location.href =
"admin-login.html";

}

loadMessages();

</script>

</body>

</html>
```

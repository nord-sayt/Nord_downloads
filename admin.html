<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>پنل مدیریت | NORD FILES</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="background"></div>

<header>

<div class="logo">
⚡ NORD ADMIN
</div>

<nav>

<a href="index.html">خانه</a>
<a href="downloads.html">دانلودها</a>
<a href="gallery.html">گالری</a>
<a href="news.html">اخبار</a>
<a href="support.html">پشتیبانی</a>

</nav>

</header>

<section class="admin-header">

<h1>🛠 پنل مدیریت</h1>

<p>

مدیریت پیام‌های سایت

</p>

</section>

<section class="admin-stats">

<div class="stat-card">

<h2 id="messageCount">

0

</h2>

<span>

پیام دریافتی

</span>

</div>

</section>

<section>

<div id="messagesContainer">

</div>

</section>

<script>

let messages =
JSON.parse(
localStorage.getItem(
"supportMessages"
)
) || [];

document.getElementById(
"messageCount"
).innerText =
messages.length;

function loadMessages(){

const container =
document.getElementById(
"messagesContainer"
);

container.innerHTML = "";

messages.reverse().forEach(
(msg,index)=>{

container.innerHTML += `

<div class="message-card">

<h3>${msg.subject}</h3>

<p><b>نام:</b> ${msg.name}</p>

<p>${msg.message}</p>

<small>${msg.date}</small>

<br><br>

<button
onclick="deleteMessage(${index})"
class="delete-btn">

حذف پیام

</button>

</div>

`;

});

}

function deleteMessage(index){

messages.splice(index,1);

localStorage.setItem(
"supportMessages",
JSON.stringify(messages)
);

location.reload();

}

loadMessages();

</script>

</body>

</html>

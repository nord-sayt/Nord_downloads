<script>

const images=[

"images/server1.jpg",
"images/server2.jpg",
"images/server3.jpg",
"images/server4.jpg",
"images/server5.jpg",
"images/server6.jpg"

];

let current=0;

setInterval(()=>{

current++;

if(current>=images.length)
current=0;

document.getElementById(
"sliderImage"
).src=
images[current];

},3000);

const btn =
document.getElementById(
"themeBtn"
);

if(localStorage.getItem("theme")==="light"){

document.body.classList.add("light");
btn.innerText="☀️";

}

btn.onclick=()=>{

document.body.classList.toggle("light");

if(document.body.classList.contains("light")){

localStorage.setItem(
"theme",
"light"
);

btn.innerText="☀️";

}else{

localStorage.setItem(
"theme",
"dark"
);

btn.innerText="🌙";

}

};

<script>

fetch("news.json")

.then(response => response.json())

.then(data => {

const container =
document.getElementById(
"news-container"
);

data.forEach(news => {

container.innerHTML += `

<div class="news-card">

<h2>${news.title}</h2>

<span>${news.date}</span>

<p>${news.text}</p>

</div>

`;

});

});

</script>

<section class="container section">

<h2>آخرین اخبار</h2>

<div id="news-container" class="grid">

</div>

</section>

<script>

fetch("news.json")

.then(res=>res.json())

.then(data=>{

const container =
document.getElementById(
"news-container"
);

data.forEach(news=>{

container.innerHTML += `

<div class="card">

<h3>${news.title}</h3>

<p>${news.text}</p>

</div>

`;

});

});

</script>
